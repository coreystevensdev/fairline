services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: steambot
      POSTGRES_USER: steambot
      POSTGRES_PASSWORD: steambot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U steambot"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://steambot:steambot@db:5432/steambot
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ODDS_API_KEY: ${ODDS_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-steambot}
      LANGCHAIN_ENDPOINT: ${LANGCHAIN_ENDPOINT:-https://api.smith.langchain.com}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
