name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -e ".[dev]"
      - run: pytest -q
        env:
          ODDS_API_KEY: test-key
          ANTHROPIC_API_KEY: test-key
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
